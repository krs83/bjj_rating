{% extends "base.html" %}

{% block title %}Главная - BJJ Rating{% endblock %}

{% block content %}

<style>
    .jumbotron-adaptive {
        background-repeat: no-repeat;
        background-attachment: local;
        background-position: center 25%;
        transition: all 0.3s ease;
    }

    @media (min-width: 1360px) {
        .jumbotron-adaptive {
            background-image: url('{{ header_image }}');
            background-size: cover;
            min-height: 500px;
            padding: 5rem;
        }
    }

    @media (max-width: 1359px) {
        .jumbotron-adaptive {
            background-image: url('{{ header_image_mobile|default(header_image) }}');
            width: 100%;
            height: auto;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #1a1a2e;
            min-height: 280px;
            padding: 2rem 1.5rem;
        }
    }
</style>

<div class="row">
    <div class="col-12">
        <div class="jumbotron-adaptive text-white rounded mb-4 position-relative">
        </div>
    </div>
</div>

<!-- Топ-10 спортсменов -->
<div class="row">
    <div class="col-12">
        <h2 class="mb-4"><i class="fas fa-crown"></i> Топ-10 спортсменов</h2>

        {% include "components/search.html" %}

        {% include "components/athletes_list.html" %}

        <!-- Ссылка на полный список -->
        <div class="text-center mt-4">
            <a class="btn btn-outline-primary btn-lg"
               href="/athletes"
               hx-get="/athletes/"
               hx-target="main"
               hx-push-url="true">
                <i class="fas fa-list"></i> Показать всех спортсменов
            </a>
        </div>
    </div>
</div>

{% endblock %}
